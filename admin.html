<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login · Symmetric Attack SOTA</title>
    <meta name="description" content="Administrator login for Symmetric Attack SOTA.">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Cache-Control" content="no-store">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Symmetric Attack SOTA home">
        <span class="brand-mark"></span>
        <span>Attack SOTA</span>
      </a>
      <nav class="nav" aria-label="Site navigation">
        <a href="index.html#results">Overview</a>
        <a href="index.html#sources">Sources</a>
      </nav>
    </header>

    <main>
      <section class="hero detail-hero">
        <div class="hero-copy">
          <p class="eyebrow">Admin Login</p>
          <h1>Sign in to manage data</h1>
          <p class="lede">
            Data editing tools are available only after administrator authentication.
          </p>
        </div>
      </section>

      <section id="login-section" class="section login-shell">
        <form id="login-form" class="login-card" autocomplete="off">
          <p class="eyebrow">Restricted Access</p>
          <h2>Administrator</h2>
          <label>Username or email<input name="username" autocomplete="username" autocapitalize="none" spellcheck="false" required></label>
          <label>Password
            <span class="password-row">
              <input name="password" type="password" autocomplete="current-password" required>
              <button class="password-toggle" type="button" data-password-toggle aria-label="Show password"></button>
            </span>
          </label>
          <button class="paper-link" type="submit">Sign in</button>
          <p id="login-message" class="subtle" aria-live="polite"></p>
          <div id="session-actions" class="admin-form-actions" hidden>
            <a class="ghost-link" href="manage.html">Continue with current session</a>
            <button id="logout-existing-session" class="ghost-button" type="button">Sign out</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="footer">
      <span>Admin login</span>
      <span><a href="index.html">Back to public site</a></span>
    </footer>

    <script src="cloudflare-config.js"></script>
    <script src="data.js"></script>
    <script src="backend.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
